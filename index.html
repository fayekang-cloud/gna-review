<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GNA Company · 연봉 재계약 리뷰</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.landing{min-height:100vh;background:linear-gradient(160deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.landing h1{font-size:32px;font-weight:800;color:#f8fafc;margin:0 0 8px}
.landing .sub{color:#64748b;font-size:14px;margin:0 0 40px;line-height:1.6}
.landing .tag{font-size:13px;letter-spacing:3px;color:#94a3b8;margin-bottom:12px;font-weight:600}
.mode-btn{width:100%;padding:18px 24px;border-radius:14px;border:1.5px solid #334155;background:linear-gradient(135deg,#1e293b,#334155);color:#f8fafc;font-size:16px;font-weight:700;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;transition:border-color .2s;margin-bottom:12px;font-family:inherit}
.mode-btn:hover{border-color:#2563eb}
.mode-btn .desc{font-size:12px;font-weight:400;color:#94a3b8;margin-top:4px}
.mode-btn .arrow{font-size:22px}

.header{background:#0f172a;padding:20px 24px 16px;position:sticky;top:0;z-index:10}
.header-inner{max-width:640px;margin:0 auto}
.header .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.header .brand{font-size:11px;letter-spacing:2px;color:#64748b}
.header h2{margin:2px 0 0;font-size:17px;font-weight:700;color:#f8fafc}
.exit-btn{background:none;border:1px solid #334155;border-radius:8px;padding:6px 14px;color:#94a3b8;font-size:12px;cursor:pointer;font-family:inherit}
.progress-bar{height:3px;background:#1e293b;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#60a5fa);border-radius:2px;transition:width .4s ease}

.content{max-width:640px;margin:0 auto;padding:24px 20px 120px}
.card{background:#fff;border-radius:16px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-header{padding:18px 24px;border-bottom:1px solid #f1f5f9;background:#fafbfc;display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:16px;font-weight:700}
.card-header .step{font-size:12px;color:#94a3b8}
.card-sub{font-size:13px;color:#94a3b8;margin-top:4px}
.card-body{padding:20px 24px}

.field{margin-bottom:20px}
.field label{display:block;font-size:14px;font-weight:600;color:#1e293b;margin-bottom:6px;line-height:1.5;white-space:pre-line}
.field .req{color:#ef4444}
.field .hint{font-size:12px;color:#94a3b8;margin-bottom:8px;line-height:1.5}
.field input,.field textarea{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;background:#fafbfc;transition:border .2s;outline:none}
.field textarea{resize:vertical;line-height:1.7;min-height:120px}
.field input:focus,.field textarea:focus{border-color:#2563eb}

.guide-box{padding:16px;border-radius:12px;background:#f8fafc;border:1px solid #e5e7eb;margin-bottom:20px}
.guide-box .title{font-size:13px;font-weight:700;color:#475569;margin-bottom:10px}
.guide-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.guide-num{width:26px;height:26px;border-radius:8px;background:#2563eb;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.guide-text{font-size:12px;color:#334155}
.guide-text strong{color:#1e293b}
.guide-text span{color:#64748b}

.grade-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grade-item{padding:8px 12px;border-radius:10px;background:#fff;border:1px solid #e5e7eb}
.grade-item .g{font-size:14px;font-weight:800;color:#2563eb}
.grade-item .gl{font-size:12px;font-weight:600;color:#1e293b;margin-left:4px}
.grade-item .gd{font-size:11px;color:#94a3b8;margin-top:3px;line-height:1.4}

.cv-card{padding:20px;border-radius:14px;margin-bottom:16px}
.cv-title{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cv-title .kr{font-size:20px;font-weight:800}
.cv-title .en{font-size:13px;opacity:.7;font-weight:500}
.cv-behaviors{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.cv-behaviors span{padding:3px 10px;border-radius:6px;background:#fff;border:1px solid #e2e8f0;font-size:11px;color:#64748b}
.cv-q{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:6px}

.scale-row{display:flex;gap:8px;margin:8px 0 16px}
.scale-btn{width:52px;padding:8px 0;border-radius:10px;border:2px solid #e2e8f0;background:#fff;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit}
.scale-btn.active{color:#fff}
.scale-btn .sl{font-size:9px;font-weight:500;opacity:.9}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;padding:12px 20px;z-index:10}
.bottom-inner{max-width:640px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.btn-prev{padding:10px 20px;border-radius:10px;border:1.5px solid #e2e8f0;background:#fff;color:#475569;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-prev:disabled{color:#cbd5e1;cursor:default}
.btn-next{padding:10px 24px;border-radius:10px;border:none;background:#2563eb;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s;font-family:inherit}
.btn-next:disabled{background:#cbd5e1;cursor:default}
.step-indicator{font-size:12px;color:#94a3b8}

.done{min-height:100vh;background:linear-gradient(160deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.done .icon{font-size:56px;margin-bottom:16px}
.done h2{color:#f8fafc;font-size:24px;font-weight:800;margin:0 0 8px}
.done p{color:#94a3b8;font-size:14px;margin:0 0 32px;line-height:1.6}
.done button{padding:14px 32px;border-radius:12px;background:#2563eb;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit}

@media(max-width:480px){
  .landing h1{font-size:26px}
  .grade-grid{grid-template-columns:1fr}
  .scale-row{gap:5px}
  .scale-btn{width:44px;font-size:12px}
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ══════════════════════════════════════════════
// Google Sheets 연동 설정

// ══════════════════════════════════════════════
const SHEET_WEBHOOK_URL = "";  // ← 여기에 Apps Script 웹앱 URL 붙여넣기

// ── Data ──
const coreValues = [
  { en:"Integrity", kr:"솔직", color:"#2563EB", bg:"#EFF6FF", border:"#BFDBFE",

  { en:"Ownership", kr:"오너십", color:"#7C3AED", bg:"#F5F3FF", border:"#DDD6FE",

  { en:"Courage", kr:"용기", color:"#DC2626", bg:"#FEF2F2", border:"#FECACA",
    behaviors:["실패는 또 다른 시작점","주저함은 기회를 놓칠 뿐","변화의 시작은 해오던 일로부터"]},

const scaleInfo = [
  {n:1,label:"인지 단계",desc:"가치를 이해하고 있으나, 업무에서 실천으로 이어지지 못한 단계"},
  {n:2,label:"시도 단계",desc:"실천을 시도하고 있으나, 상황에 따라 일관성이 부족한 단계"},

const gradeGuide = [
  {g:"A",label:"기대 이상으로 뛰어남",desc:"개인 목표 초과 달성, 크로스팀 협업에 주도적 기여, 비즈니스 임팩트가 명확함"},

const selfSections = [
  {id:"info",title:"기본 정보",fields:[
    {key:"name",label:"이름",type:"text",req:true},
    {key:"team",label:"소속(팀명/스쿼드)",type:"text",req:true},

  ]},
  {id:"s1",title:"Section 1. 성과 리뷰",sub:"지난 1년간의 성과를 정성·정량 양면으로 돌아봅니다.",fields:[
    {key:"s1q1",label:"지난 1년간 내가 직접 기여했다고 확신할 수 있는 주요 성과와, 그 결과가 팀이나 서비스에 준 영향을 구체적으로 적어주세요.\n가능하다면 핵심 지표(숫자)도 함께 기재해주세요. (예: MAU 증가율, ROAS, 처리 건수, 매출 기여액 등)",type:"textarea",req:true},

  ]},
  {id:"s3",title:"Section 3. 성장 & 혁신",sub:"자기 주도적 개선과 새로운 시도를 평가합니다.",fields:[
    {key:"s3q1",label:"퍼포먼스를 높이기 위해 새로운 방식(AI·자동화 도구 활용 포함)을 시도한 경험이 있나요?\n그 시도가 어떤 변화를 가져왔는지 구체적으로 적어주세요.",type:"textarea",req:true},

  {id:"s5",title:"Section 5. 종합 자가 평가",type:"final",fields:[

  ]},
];

const leaderSections = [
  {id:"info",title:"기본 정보",fields:[
    {key:"targetName",label:"평가 대상자 이름",type:"text",req:true},
    {key:"targetTeam",label:"대상자 소속(팀명/스쿼드)",type:"text",req:true},
    {key:"reviewerName",label:"리드/동료 이름",type:"text",req:true},
    {key:"reviewerTeam",label:"리드/동료 소속(팀명/스쿼드)",type:"text",req:true},
  ]},
  {id:"s1",title:"Section 1. 성과 평가",sub:"대상자의 주요 성과와 미흡했던 부분을 평가합니다.",fields:[
    {key:"s1q1",label:"이 구성원이 지난 1년간 주도하거나 핵심적으로 기여한 주요 성과와 그 영향을 적어주세요.\n인상적이었던 판단이나 선택이 있었다면 함께 기재해주세요.\n가능하다면 핵심 지표(숫자)도 함께 적어주세요. (예: KPI 달성률, 프로젝트 완료율, 매출 기여도 등)",type:"textarea",req:true},
    {key:"s1q2",label:"이 구성원이 업무 목표를 달성하지 못한 일이 있었다면, 그 원인은 무엇이었고\n해당 경험에서 어떤 인사이트 혹은 개선점이 있었다고 보시나요?",type:"textarea",req:true},
  ]},
  {id:"s2",title:"Section 2. 협업 & 신뢰",sub:"회사 목표를 위한 추가 기여와 신뢰 구축 정도를 평가합니다.",fields:[
    {key:"s2q1",label:"이 구성원은 회사 목표를 위해 소속 팀 업무 외에 타팀과 협업하거나 추가 업무를 진행한 경험이 있나요?\n해당 경험과 그 과정에서 회사 매출/퍼포먼스 향상/리소스 감축 등 가져온 변화를 적어주세요.\n또한 동료 간 신뢰를 쌓는 행동(투명한 정보 공유, 약속 이행, 피드백 수용 등)을 일관되게 보여주었나요?",type:"textarea",req:true},
  ]},
  {id:"s3",title:"Section 3. 성장 & 혁신",sub:"자기 주도적 개선과 새로운 시도를 평가합니다.",fields:[

  ]},
  {id:"s4",title:"Section 4. 핵심가치 평가",sub:"GNA의 3대 핵심가치 실천 정도를 평가합니다.",type:"corevalue",mode:"leader"},

// ── State ──
let state = { mode: null, step: 0, data: {}, submitted: false, saving: false };

function setState(patch) {
  Object.assign(state, patch);
  render();
}

function setData(key, val) {
  state.data[key] = val;
  // Don't re-render on every keystroke - just update state
}

// Debounced render for validation updates
let renderTimer = null;
function setDataAndRender(key, val) {
  state.data[key] = val;
  clearTimeout(renderTimer);
  renderTimer = setTimeout(() => render(), 300);
}

// ── Render helpers ──
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') el.className = v;
    else if (k === 'innerHTML') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat(Infinity).forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}

function renderScaleGuide() {
  const box = h('div', {className:'guide-box'});
  box.appendChild(h('div', {className:'title'}, '평가 단계 기준'));
  scaleInfo.forEach(s => {
    const row = h('div', {className:'guide-row'});
    row.appendChild(h('div', {className:'guide-num'}, String(s.n)));
    const txt = h('div', {className:'guide-text'});
    txt.appendChild(h('strong', null, s.label));
    txt.appendChild(h('span', null, ` — ${s.desc}`));
    row.appendChild(txt);
    box.appendChild(row);
  });
  return box;
}

function renderGradeGuide() {
  const box = h('div', {className:'guide-box'});
  box.appendChild(h('div', {className:'title'}, '등급 참고 기준'));
  const grid = h('div', {className:'grade-grid'});
  gradeGuide.forEach(g => {
    const item = h('div', {className:'grade-item'});
    item.appendChild(h('span', {className:'g'}, g.g + '.'));
    item.appendChild(h('span', {className:'gl'}, g.label));
    item.appendChild(h('div', {className:'gd'}, g.desc));
    grid.appendChild(item);
  });
  box.appendChild(grid);
  return box;
}

function renderField(f) {
  const div = h('div', {className:'field'});
  const lbl = h('label', null, f.label.replace(/\n/g, '\n'));
  if (f.req) lbl.appendChild(h('span', {className:'req'}, ' *'));
  div.appendChild(lbl);
  if (f.hint) div.appendChild(h('div', {className:'hint'}, f.hint));

  if (f.type === 'textarea') {
    const ta = h('textarea', {rows:'5'});
    ta.value = state.data[f.key] || '';
    ta.addEventListener('input', e => {
      state.data[f.key] = e.target.value;
      updateNavButtons();
    });
    ta.setAttribute('data-key', f.key);
    div.appendChild(ta);
  } else {
    const inp = h('input', {type: f.type});
    inp.value = state.data[f.key] || '';
    inp.addEventListener('input', e => {
      state.data[f.key] = e.target.value;
      updateNavButtons();
    });
    inp.setAttribute('data-key', f.key);
    div.appendChild(inp);
  }
  return div;
}

function renderCoreValueCard(cv, mode) {
  const card = h('div', {className:'cv-card', style:{background:cv.bg, border:`1.5px solid ${cv.border}`}});
  
  const title = h('div', {className:'cv-title'});
  title.appendChild(h('span', {className:'kr', style:{color:cv.color}}, cv.kr));
  title.appendChild(h('span', {className:'en', style:{color:cv.color}}, cv.en));
  card.appendChild(title);

  const beh = h('div', {className:'cv-behaviors'});
  cv.behaviors.forEach(b => beh.appendChild(h('span', null, b)));
  card.appendChild(beh);

  const scoreKey = cv.en + '_score';
  const textKey = cv.en + '_text';

  const qLabel = mode === 'self' 
    ? `"${cv.kr}" 가치를 얼마나 잘 실천했나요?` 
    : `이 구성원은 "${cv.kr}" 가치를 얼마나 잘 실천했나요?`;
  const q1 = h('div', {className:'cv-q'}, qLabel);
  q1.appendChild(h('span', {className:'req'}, ' *'));
  card.appendChild(q1);

  const scaleRow = h('div', {className:'scale-row'});
  scaleInfo.forEach(s => {
    const isActive = state.data[scoreKey] === s.n;
    const btn = h('button', {
      className: 'scale-btn' + (isActive ? ' active' : ''),
      style: isActive ? {background:cv.color, borderColor:cv.color, color:'#fff'} : {},
      onClick: () => { state.data[scoreKey] = s.n; render(); }
    });
    btn.appendChild(h('span', null, String(s.n)));
    btn.appendChild(h('span', {className:'sl'}, s.label));
    scaleRow.appendChild(btn);
  });
  card.appendChild(scaleRow);

  const evidenceLabel = mode === 'self'
    ? '위 점수의 근거가 되는 사례와, 앞으로 더 발전시키고 싶은 부분을 함께 적어주세요.'
    : '위 점수의 근거가 되는 구체적 사례를 적어주세요.';
  const q2 = h('div', {className:'cv-q'}, evidenceLabel);
  q2.appendChild(h('span', {className:'req'}, ' *'));
  card.appendChild(q2);

  const ta = h('textarea', {rows:'3', style:{border:`1.5px solid #e2e8f0`, borderRadius:'10px', fontSize:'13px', lineHeight:'1.6', fontFamily:'inherit', background:'#fff', padding:'10px 14px', width:'100%', outline:'none', boxSizing:'border-box', resize:'vertical'}});
  ta.value = state.data[textKey] || '';
  ta.addEventListener('input', e => {
    state.data[textKey] = e.target.value;
    updateNavButtons();
  });
  ta.setAttribute('data-key', textKey);
  ta.addEventListener('focus', () => ta.style.borderColor = cv.color);
  ta.addEventListener('blur', () => ta.style.borderColor = '#e2e8f0');
  card.appendChild(ta);

  return card;
}

function canProceed() {
  const sections = state.mode === 'self' ? selfSections : leaderSections;
  const cur = sections[state.step];
  if (!cur) return false;
  if (cur.type === 'corevalue') {
    return coreValues.every(cv => state.data[cv.en+'_score'] && (state.data[cv.en+'_text']||'').trim());
  }
  if (cur.fields) {
    return cur.fields.filter(f => f.req).every(f => (state.data[f.key]||'').trim());
  }
  return true;
}

async function submitToSheet(payload) {
  if (!SHEET_WEBHOOK_URL) return;
  try {
    await fetch(SHEET_WEBHOOK_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
  } catch(e) { console.warn('Sheet 전송 실패:', e); }
}

async function handleSubmit() {
  setState({saving: true});
  const ts = new Date().toISOString();
  const payload = {...state.data, _type: state.mode, _timestamp: ts};
  
  // Save locally
  try { localStorage.setItem(`gna_review_${state.mode}_${ts}`, JSON.stringify(payload)); } catch(e) {}
  
  // Send to Google Sheet
  await submitToSheet(payload);
  
  setState({saving: false, submitted: true});
}

function updateNavButtons() {
  const nextBtn = document.querySelector('.btn-next');
  if (nextBtn) nextBtn.disabled = !canProceed();
}

// ── Main render ──
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Landing
  if (!state.mode) {
    const landing = h('div', {className:'landing'});
    const inner = h('div', {style:{maxWidth:'480px',width:'100%'}});
    inner.appendChild(h('div', {className:'tag'}, 'GNA COMPANY'));
    inner.appendChild(h('h1', null, '연봉 재계약 리뷰'));
    inner.appendChild(h('p', {className:'sub'}, '한 해를 돌아보며, 서로의 성장을 확인하는 시간입니다'));

    const selfBtn = h('button', {className:'mode-btn', onClick:()=>setState({mode:'self',step:0,data:{},submitted:false})});
    const selfInner = h('div');
    selfInner.appendChild(h('div', null, '셀프리뷰 작성'));
    selfInner.appendChild(h('div', {className:'desc'}, '대상자 본인이 직접 작성합니다'));
    selfBtn.appendChild(selfInner);
    selfBtn.appendChild(h('span', {className:'arrow'}, '→'));
    inner.appendChild(selfBtn);

    const leaderBtn = h('button', {className:'mode-btn', onClick:()=>setState({mode:'leader',step:0,data:{},submitted:false})});
    const leaderInner = h('div');
    leaderInner.appendChild(h('div', null, '리드/동료 평가 작성'));
    leaderInner.appendChild(h('div', {className:'desc'}, '리드 또는 동료가 대상자를 평가합니다'));
    leaderBtn.appendChild(leaderInner);
    leaderBtn.appendChild(h('span', {className:'arrow'}, '→'));
    inner.appendChild(leaderBtn);

    landing.appendChild(inner);
    app.appendChild(landing);
    return;
  }

  // Submitted
  if (state.submitted) {
    const done = h('div', {className:'done'});
    const inner = h('div', {style:{maxWidth:'420px'}});
    inner.appendChild(h('div', {className:'icon'}, '✅'));
    inner.appendChild(h('h2', null, '제출 완료'));
    const typeLabel = state.mode === 'self' ? '셀프리뷰가' : '리드/동료 평가가';
    inner.appendChild(h('p', null, `${typeLabel} 성공적으로 제출되었습니다.`));
    inner.appendChild(h('button', {onClick:()=>setState({mode:null,step:0,data:{},submitted:false})}, '처음으로 돌아가기'));
    done.appendChild(inner);
    app.appendChild(done);
    return;
  }

  // Form
  const sections = state.mode === 'self' ? selfSections : leaderSections;
  const cur = sections[state.step];
  const isLast = state.step === sections.length - 1;
  const progress = ((state.step + 1) / sections.length) * 100;

  // Header
  const header = h('div', {className:'header'});
  const headerInner = h('div', {className:'header-inner'});
  const top = h('div', {className:'top'});
  const leftDiv = h('div');
  leftDiv.appendChild(h('div', {className:'brand'}, 'GNA COMPANY'));
  leftDiv.appendChild(h('h2', null, state.mode === 'self' ? '셀프리뷰' : '리드/동료 평가'));
  top.appendChild(leftDiv);
  top.appendChild(h('button', {className:'exit-btn', onClick:()=>{if(confirm('작성 중인 내용이 사라집니다. 나가시겠습니까?'))setState({mode:null})}}, '나가기'));
  headerInner.appendChild(top);
  const pBar = h('div', {className:'progress-bar'});
  pBar.appendChild(h('div', {className:'progress-fill', style:{width:progress+'%'}}));
  headerInner.appendChild(pBar);
  header.appendChild(headerInner);
  app.appendChild(header);

  // Content
  const content = h('div', {className:'content'});
  const card = h('div', {className:'card'});
  
  const cardHeader = h('div', {className:'card-header'});
  const titleDiv = h('div');
  titleDiv.appendChild(h('h3', null, cur.title));
  if (cur.sub) titleDiv.appendChild(h('div', {className:'card-sub'}, cur.sub));
  cardHeader.appendChild(titleDiv);
  cardHeader.appendChild(h('span', {className:'step'}, `${state.step+1} / ${sections.length}`));
  card.appendChild(cardHeader);

  const body = h('div', {className:'card-body'});

  if (cur.type === 'corevalue') {
    body.appendChild(renderScaleGuide());
    coreValues.forEach(cv => body.appendChild(renderCoreValueCard(cv, cur.mode)));
  } else if (cur.type === 'final') {
    body.appendChild(renderGradeGuide());
    cur.fields.forEach(f => body.appendChild(renderField(f)));
  } else if (cur.fields) {
    cur.fields.forEach(f => body.appendChild(renderField(f)));
  }

  card.appendChild(body);
  content.appendChild(card);
  app.appendChild(content);

  // Bottom nav
  const nav = h('div', {className:'bottom-nav'});
  const navInner = h('div', {className:'bottom-inner'});
  
  const prevBtn = h('button', {className:'btn-prev', onClick:()=>setState({step:Math.max(0,state.step-1)})}, '← 이전');
  if (state.step === 0) prevBtn.disabled = true;
  navInner.appendChild(prevBtn);
  
  navInner.appendChild(h('span', {className:'step-indicator'}, `${state.step+1} / ${sections.length}`));

  if (isLast) {
    const submitBtn = h('button', {className:'btn-next', onClick:handleSubmit}, state.saving ? '저장 중...' : '제출하기 ✓');
    if (!canProceed() || state.saving) submitBtn.disabled = true;
    navInner.appendChild(submitBtn);
  } else {
    const nextBtn = h('button', {className:'btn-next', onClick:()=>{ window.scrollTo(0,0); setState({step:state.step+1}); }}, '다음 →');
    if (!canProceed()) nextBtn.disabled = true;
    navInner.appendChild(nextBtn);
  }

  nav.appendChild(navInner);
  app.appendChild(nav);
}

// Initial render
render();
</script>
</body>
</html>
