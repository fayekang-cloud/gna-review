*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}

/* ── Gate ── */
.gate{min-height:100vh;background:linear-gradient(160deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.gate h1{font-size:28px;font-weight:800;color:#f8fafc;margin:0 0 8px}
.gate .sub{color:#64748b;font-size:14px;margin:0 0 28px;line-height:1.6}
.gate .tag{font-size:13px;letter-spacing:3px;color:#94a3b8;margin-bottom:12px;font-weight:600}
.gate-field{margin-bottom:16px;text-align:left;max-width:320px;width:100%;margin-left:auto;margin-right:auto}
.gate-label{font-size:12px;color:#94a3b8;margin-bottom:6px;font-weight:500}
.gate-input{width:100%;padding:14px 18px;border:1.5px solid #334155;border-radius:12px;background:#0f172a;color:#f8fafc;font-size:15px;font-family:inherit;outline:none;transition:border .2s}
.gate-input:focus{border-color:#2563eb}
.gate-input::placeholder{color:#475569}
.gate-code{letter-spacing:4px;text-align:center;font-size:18px;text-transform:uppercase}
.gate-error{color:#ef4444;font-size:13px;margin-top:8px;min-height:20px;text-align:center}
.gate-btn{padding:12px 32px;border-radius:12px;background:#2563eb;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .2s;width:100%;max-width:320px}
.gate-btn:hover{background:#1d4ed8}

/* ── Landing ── */
.landing{min-height:100vh;background:linear-gradient(160deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.landing h1{font-size:32px;font-weight:800;color:#f8fafc;margin:0 0 8px}
.landing .sub{color:#64748b;font-size:14px;margin:0 0 40px;line-height:1.6}
.landing .tag{font-size:13px;letter-spacing:3px;color:#94a3b8;margin-bottom:12px;font-weight:600}
.landing .welcome{color:#60a5fa;font-size:14px;margin-bottom:32px;font-weight:500}
.mode-btn{width:100%;padding:18px 24px;border-radius:14px;border:1.5px solid #334155;background:linear-gradient(135deg,#1e293b,#334155);color:#f8fafc;font-size:16px;font-weight:700;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;transition:border-color .2s;margin-bottom:12px;font-family:inherit}
.mode-btn:hover{border-color:#2563eb}
.mode-btn .desc{font-size:12px;font-weight:400;color:#94a3b8;margin-top:4px}
.mode-btn .arrow{font-size:22px}
.draft-badge{display:inline-block;padding:2px 8px;border-radius:6px;background:#fef3c7;color:#92400e;font-size:11px;font-weight:600;margin-left:8px}

/* ── Header ── */
.header{background:#0f172a;padding:16px 24px;position:sticky;top:0;z-index:20}
.header-inner{max-width:720px;margin:0 auto}
.header .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header .brand{font-size:11px;letter-spacing:2px;color:#64748b}
.header h2{margin:2px 0 0;font-size:17px;font-weight:700;color:#f8fafc}
.header-btns{display:flex;gap:8px}
.exit-btn,.save-btn{background:none;border:1px solid #334155;border-radius:8px;padding:6px 14px;color:#94a3b8;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
.save-btn{border-color:#059669;color:#34d399}
.save-btn:hover{background:#059669;color:#fff}
.progress-bar{height:3px;background:#1e293b;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#60a5fa);border-radius:2px;transition:width .4s ease}

/* ── Section Nav (sticky pills) ── */
.section-nav{position:sticky;top:68px;z-index:15;background:rgba(241,245,249,.95);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid #e2e8f0;padding:10px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.section-nav::-webkit-scrollbar{display:none}
.nav-inner{max-width:720px;margin:0 auto;padding:0 20px;display:flex;gap:6px}
.nav-pill{flex-shrink:0;padding:6px 14px;font-size:12px;font-weight:600;color:#64748b;background:#fff;border:1.5px solid #e2e8f0;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.nav-pill:hover{border-color:#93c5fd;color:#2563eb}
.nav-pill.active{background:#2563eb;color:#fff;border-color:#2563eb}
.nav-pill.filled{background:#ecfdf5;color:#059669;border-color:#6ee7b7}

/* ── Content ── */
.content{max-width:720px;margin:0 auto;padding:24px 20px 80px}

/* ── Card ── */
.card{background:#fff;border-radius:16px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.04);scroll-margin-top:120px}
.card-header{padding:18px 24px;border-bottom:1px solid #f1f5f9;background:#fafbfc;display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:16px;font-weight:700}
.card-header .step{font-size:12px;color:#94a3b8}
.card-sub{font-size:13px;color:#94a3b8;margin-top:4px}
.card-body{padding:20px 24px}

/* ── Fields ── */
.field{margin-bottom:20px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:14px;font-weight:600;color:#1e293b;margin-bottom:6px;line-height:1.5;white-space:pre-line}
.field .req{color:#ef4444}
.field input,.field textarea{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;background:#fafbfc;transition:border .2s;outline:none}
.field textarea{resize:vertical;line-height:1.7;min-height:120px}
.field input:focus,.field textarea:focus{border-color:#2563eb}

/* ── Guide Box ── */
.guide-box{padding:16px;border-radius:12px;background:#f8fafc;border:1px solid #e5e7eb;margin-bottom:20px}
.guide-box .title{font-size:13px;font-weight:700;color:#475569;margin-bottom:10px}
.guide-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.guide-num{width:26px;height:26px;border-radius:8px;background:#2563eb;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.guide-text{font-size:12px;color:#334155}
.guide-text strong{color:#1e293b}
.guide-text span{color:#64748b}

/* ── Grade ── */
.grade-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.grade-item{padding:10px 14px;border-radius:10px;background:#fff;border:2px solid #e5e7eb;cursor:pointer;transition:all .15s}
.grade-item:hover{border-color:#93c5fd}
.grade-item.active{border-color:#2563eb;background:#eff6ff}
.grade-item .g{font-size:14px;font-weight:800;color:#2563eb}
.grade-item .gl{font-size:12px;font-weight:600;color:#1e293b;margin-left:4px}
.grade-item .gd{font-size:11px;color:#94a3b8;margin-top:3px;line-height:1.4}

/* ── Core Value ── */
.cv-card{padding:20px;border-radius:14px;margin-bottom:16px}
.cv-title{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cv-title .kr{font-size:20px;font-weight:800}
.cv-title .en{font-size:13px;opacity:.7;font-weight:500}
.cv-behaviors{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.cv-behaviors span{padding:3px 10px;border-radius:6px;border:none;font-size:11px;color:#94a3b8}
.cv-q{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:6px}
.scale-row{display:flex;gap:8px;margin:8px 0 16px}
.scale-btn{width:52px;padding:8px 0;border-radius:10px;border:2px solid #e2e8f0;background:#fff;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit}
.scale-btn.active{color:#fff}
.scale-btn .sl{font-size:9px;font-weight:500;opacity:.9}

/* ── Submit Bar (fixed bottom) ── */
.submit-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;padding:12px 20px;z-index:10}
.submit-inner{max-width:720px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.submit-info{font-size:12px;color:#94a3b8}
.submit-info .count{font-weight:700;color:#2563eb}
.submit-info .done-count{color:#059669}
.btn-submit{padding:10px 32px;border-radius:10px;border:none;background:#2563eb;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-submit:hover{background:#1d4ed8}
.btn-submit:disabled{background:#cbd5e1;cursor:default}

/* ── Toast ── */
.saved-toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#059669;color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:100;animation:fadeout 2s forwards}
@keyframes fadeout{0%,70%{opacity:1}100%{opacity:0}}

/* ── Done ── */
.done{min-height:100vh;background:linear-gradient(160deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.done .icon{font-size:56px;margin-bottom:16px}
.done h2{color:#f8fafc;font-size:24px;font-weight:800;margin:0 0 8px}
.done p{color:#94a3b8;font-size:14px;margin:0 0 32px;line-height:1.6}
.done button{padding:14px 32px;border-radius:12px;background:#2563eb;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit}

/* ── Section Divider ── */
.section-divider{height:4px;border-radius:2px;margin:8px 0 20px;background:linear-gradient(90deg,#2563eb22,#2563eb08)}

/* ── Scroll to top ── */
.scroll-top{position:fixed;bottom:70px;right:20px;width:40px;height:40px;border-radius:50%;background:#2563eb;color:#fff;border:none;cursor:pointer;font-size:18px;display:none;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(37,99,235,.3);z-index:10;transition:opacity .2s}
.scroll-top.show{display:flex}

@media(max-width:480px){
  .landing h1,.gate h1{font-size:26px}
  .grade-grid{grid-template-columns:1fr}
  .scale-row{gap:5px}
  .scale-btn{width:44px;font-size:12px}
  .nav-pill{padding:5px 11px;font-size:11px}
}
</style>

// ═══ State ═══
let D={},mode=null,authEmail='',submitted=false,saving=false,activeNav=0;
function secs(){return mode==='self'?selfS:leaderS}
function draftKey(){return 'gna_draft_'+mode+'_'+authEmail}

// ═══ Draft ═══
function saveDraft(){
  if(!mode||!authEmail)return;
  try{localStorage.setItem(draftKey(),JSON.stringify({data:D,ts:Date.now()}))}catch(e){}
}
function loadDraft(){try{const raw=localStorage.getItem(draftKey());if(!raw)return null;return JSON.parse(raw)}catch(e){return null}}
function clearDraft(){try{localStorage.removeItem(draftKey())}catch(e){}}
function hasDraft(m){try{return!!localStorage.getItem('gna_draft_'+m+'_'+authEmail)}catch(e){return false}}
function showToast(msg){const t=document.createElement('div');t.className='saved-toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2200)}
setInterval(()=>{if(mode&&authEmail&&!submitted){saveDraft()}},30000);

// ═══ Section completion check ═══
function isSectionFilled(sec){
  if(sec.tp==='cv') return CV.every(v=>D[v.en+'_score']&&(D[v.en+'_text']||'').trim());
  if(sec.tp==='final') return D.grade&&sec.f&&sec.f.every(f=>(D[f.k]||'').trim());
  if(sec.f) return sec.f.filter(f=>!f.opt).every(f=>(D[f.k]||'').trim());
  return false;
}
function allFilled(){return secs().every(s=>isSectionFilled(s))}
function filledCount(){return secs().filter(s=>isSectionFilled(s)).length}

// ═══ Helpers ═══
function h(t,a,...ch){const e=document.createElement(t);if(a)Object.entries(a).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='className')e.className=v;else e.setAttribute(k,v)});ch.flat(Infinity).forEach(x=>{if(x!=null)e.appendChild(typeof x==='string'?document.createTextNode(x):x)});return e}

// ═══ Submit ═══
async function submit(){
  if(!allFilled()){showToast('⚠️ 미작성 항목이 있습니다');return}
  if(!confirm('제출하시겠습니까? 제출 후에는 수정할 수 없습니다.'))return;
  saving=true;updateSubmitBar();
  const ts=new Date().toISOString(),p={...D,_type:mode,_email:authEmail,_timestamp:ts};
  try{localStorage.setItem('gna_'+mode+'_'+ts,JSON.stringify(p))}catch(e){}
  if(SHEET_WEBHOOK_URL)try{await fetch(SHEET_WEBHOOK_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})}catch(e){}
  clearDraft();saving=false;submitted=true;R();
}

// ═══ Renderers ═══
function rScaleGuide(){
  const b=h('div',{className:'guide-box'});
  b.appendChild(h('div',{className:'title'},'평가 단계 기준'));
  SI.forEach(s=>{const r=h('div',{className:'guide-row'});r.appendChild(h('div',{className:'guide-num'},String(s.n)));const t=h('div',{className:'guide-text'});t.appendChild(h('strong',null,s.l));t.appendChild(h('span',null,' — '+s.d));r.appendChild(t);b.appendChild(r)});
  return b;
}

function rGrade(){
  const w=h('div',null),b=h('div',{className:'guide-box'});
  b.appendChild(h('div',{className:'title'},'종합 등급 선택 *'));
  const g=h('div',{className:'grade-grid'});
  GG.forEach(x=>{
    const a=D.grade===x.g;
    const i=h('div',{className:'grade-item'+(a?' active':''),onClick:()=>{D.grade=x.g;reRenderSection('s5');updateNav();updateSubmitBar()}});
    i.appendChild(h('span',{className:'g'},x.g+'.'));
    i.appendChild(h('span',{className:'gl'},x.l));
    i.appendChild(h('div',{className:'gd'},x.d));
    g.appendChild(i);
  });
  b.appendChild(g);w.appendChild(b);return w;
}

function rField(f,secId){
  const d=h('div',{className:'field'}),l=h('label',null,f.l);
  if(!f.opt)l.appendChild(h('span',{className:'req'},' *'));
  d.appendChild(l);
  if(f.tp==='ta'){
    const t=h('textarea',{rows:'5'});t.value=D[f.k]||'';
    t.addEventListener('input',e=>{D[f.k]=e.target.value;updateNav();updateSubmitBar()});
    d.appendChild(t);
  }else{
    const i=h('input',{type:f.tp});i.value=D[f.k]||'';
    i.addEventListener('input',e=>{D[f.k]=e.target.value;updateNav();updateSubmitBar()});
    d.appendChild(i);
    if(f.hint)d.appendChild(h('p',{style:{fontSize:'12px',color:'#94a3b8',marginTop:'5px'}},f.hint));
  }
  return d;

function rCV(cv,m,secId){
  const card=h('div',{className:'cv-card',style:{background:cv.bg,border:'1.5px solid '+cv.border}});
  const ti=h('div',{className:'cv-title'});
  ti.appendChild(h('span',{className:'kr',style:{color:cv.color}},cv.kr));
  ti.appendChild(h('span',{className:'en',style:{color:cv.color}},cv.en));
  card.appendChild(ti);
  const be=h('div',{className:'cv-behaviors'});cv.beh.forEach(b=>be.appendChild(h('span',null,b)));card.appendChild(be);

  const sk=cv.en+'_score',tk=cv.en+'_text';
  const ql=m==='self'?`"${cv.kr}" 가치를 얼마나 잘 실천했나요?`:`이 구성원은 "${cv.kr}" 가치를 얼마나 잘 실천했나요?`;
  const q1=h('div',{className:'cv-q'},ql);q1.appendChild(h('span',{className:'req'},' *'));card.appendChild(q1);

  const sr=h('div',{className:'scale-row'});
  SI.forEach(s=>{
    const a=D[sk]===s.n;
    const b=h('button',{className:'scale-btn'+(a?' active':''),style:a?{background:cv.color,borderColor:cv.color,color:'#fff'}:{},
      onClick:()=>{D[sk]=s.n;reRenderSection(secId);updateNav();updateSubmitBar()}});
    b.appendChild(h('span',null,String(s.n)));
    b.appendChild(h('span',{className:'sl'},s.l));
    sr.appendChild(b);
  });
  card.appendChild(sr);

  const el=m==='self'?'위 점수의 근거가 되는 사례와, 앞으로 더 발전시키고 싶은 부분을 함께 적어주세요.':'위 점수의 근거가 되는 구체적 사례를 적어주세요.';
  const q2=h('div',{className:'cv-q'},el);q2.appendChild(h('span',{className:'req'},' *'));card.appendChild(q2);

  const ta=h('textarea',{rows:'3',style:{border:'1.5px solid #e2e8f0',borderRadius:'10px',fontSize:'13px',lineHeight:'1.6',fontFamily:'inherit',background:'#fff',padding:'10px 14px',width:'100%',outline:'none',boxSizing:'border-box',resize:'vertical'}});
  ta.value=D[tk]||'';
  ta.addEventListener('input',e=>{D[tk]=e.target.value;updateNav();updateSubmitBar()});
  ta.addEventListener('focus',()=>ta.style.borderColor=cv.color);
  ta.addEventListener('blur',()=>ta.style.borderColor='#e2e8f0');

function renderSectionCard(sec,idx){
  const card=h('div',{className:'card',id:'sec-'+sec.id});
  const ch2=h('div',{className:'card-header'}),td=h('div');
  td.appendChild(h('h3',null,sec.t));
  if(sec.sub)td.appendChild(h('div',{className:'card-sub'},sec.sub));
  ch2.appendChild(td);
  const stepLabel=h('span',{className:'step'},(idx+1)+' / '+secs().length);
  ch2.appendChild(stepLabel);
  card.appendChild(ch2);

  const bd=h('div',{className:'card-body'});
  if(sec.tp==='cv'){
    bd.appendChild(rScaleGuide());
    CV.forEach(v=>bd.appendChild(rCV(v,sec.mode,sec.id)));
  } else if(sec.tp==='final'){
    bd.appendChild(rGrade());
    sec.f.forEach(f=>bd.appendChild(rField(f,sec.id)));
  } else if(sec.f){
    sec.f.forEach(f=>bd.appendChild(rField(f,sec.id)));
  }
  card.appendChild(bd);
  return card;
}

function reRenderSection(secId){
  const ss=secs();
  const idx=ss.findIndex(s=>s.id===secId);
  if(idx<0)return;
  const old=document.getElementById('sec-'+secId);
  if(!old)return;
  const newCard=renderSectionCard(ss[idx],idx);
  old.replaceWith(newCard);
}

// ═══ Nav update (without full re-render) ═══
function updateNav(){
  const pills=document.querySelectorAll('.nav-pill');
  const ss=secs();
  pills.forEach((pill,i)=>{
    const filled=isSectionFilled(ss[i]);
    pill.className='nav-pill'+(i===activeNav?' active':'')+(filled&&i!==activeNav?' filled':'');
  });
  updateProgress();
}

function updateSubmitBar(){
  const btn=document.getElementById('submitBtn');
  const info=document.getElementById('submitInfo');
  if(!btn||!info)return;
  const fc=filledCount(),total=secs().length;
  btn.disabled=!allFilled()||saving;
  btn.textContent=saving?'저장 중...':'제출하기 ✓';
  info.innerHTML=fc===total
    ?'<span class="done-count">✓ 모든 섹션 작성 완료</span>'
    :'작성 완료 <span class="count">'+fc+' / '+total+'</span> 섹션';
}

function updateProgress(){
  const bar=document.getElementById('progressFill');
  if(!bar)return;
  const fc=filledCount(),total=secs().length;
  bar.style.width=(fc/total*100)+'%';
}

// ═══ Scroll spy ═══
function setupScrollSpy(){
  const ss=secs();
  const observer=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const id=entry.target.id.replace('sec-','');
        const idx=ss.findIndex(s=>s.id===id);
        if(idx>=0&&idx!==activeNav){
          activeNav=idx;
          updateNav();
          // scroll nav pill into view
          const pill=document.querySelectorAll('.nav-pill')[idx];
          if(pill)pill.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
        }
      }
    });
  },{rootMargin:'-120px 0px -60% 0px',threshold:0.1});

  ss.forEach(s=>{
    const el=document.getElementById('sec-'+s.id);
    if(el)observer.observe(el);
  });
}

window.addEventListener('scroll',()=>{

// ═══ Main Render ═══

    const f2=h('div',{className:'gate-field'});f2.appendChild(h('div',{className:'gate-label'},'개인 인증 코드'));
    const inp2=h('input',{className:'gate-input gate-code',type:'text',placeholder:'코드 6자리',maxlength:'6'});f2.appendChild(inp2);inner.appendChild(f2);
    const err=h('div',{className:'gate-error'});inner.appendChild(err);
    inp2.addEventListener('keydown',e=>{if(e.key==='Enter')tryAuth()});
    inner.appendChild(h('button',{className:'gate-btn',onClick:tryAuth},'입장하기'));
    g.appendChild(inner);app.appendChild(g);setTimeout(()=>inp1.focus(),100);
    function tryAuth(){
      const email=inp1.value.trim().toLowerCase(),code=inp2.value.trim().toUpperCase();

      if(!code){err.textContent='인증 코드를 입력해주세요';return}
      const now=new Date(),expiry=new Date(CODE_EXPIRY_DATE+'T23:59:59');
      if(now>expiry){err.textContent='리뷰 작성 기간이 종료되었습니다. People팀에 문의해주세요.';return}
      if(!AUTH[email]){err.textContent='등록되지 않은 이메일입니다';return}
      if(AUTH[email]!==code){err.textContent='인증 코드가 올바르지 않습니다';return}
      authEmail=email;R();
    }
    return;
  }

  // Landing
  if(!mode){
    const ld=h('div',{className:'landing'}),inner=h('div',{style:{maxWidth:'480px',width:'100%'}});
    inner.appendChild(h('div',{className:'tag'},'GNA COMPANY'));
    inner.appendChild(h('h1',null,'연봉 재계약 리뷰'));
    inner.appendChild(h('p',{className:'sub'},'한 해를 돌아보며, 서로의 성장을 확인하는 시간입니다'));
    inner.appendChild(h('div',{className:'welcome'},'👋 '+authEmail));

    const b1=h('button',{className:'mode-btn',onClick:()=>{mode='self';D={};submitted=false;const dr=loadDraft();if(dr){if(confirm('이전에 임시저장된 내용이 있습니다. 이어서 작성하시겠습니까?')){D=dr.data||{}}else{clearDraft()}}R()}}),i1=h('div');
    const selfLabel=h('span',null,'셀프리뷰 작성');
    if(hasDraft('self'))selfLabel.appendChild(h('span',{className:'draft-badge'},'임시저장 있음'));
    i1.appendChild(selfLabel);i1.appendChild(h('div',{className:'desc'},'대상자 본인이 직접 작성합니다'));b1.appendChild(i1);b1.appendChild(h('span',{className:'arrow'},'→'));inner.appendChild(b1);

    const b2=h('button',{className:'mode-btn',onClick:()=>{mode='leader';D={};submitted=false;const dr=loadDraft();if(dr){if(confirm('이전에 임시저장된 내용이 있습니다. 이어서 작성하시겠습니까?')){D=dr.data||{}}else{clearDraft()}}R()}}),i2=h('div');
    const leaderLabel=h('span',null,'리드/동료 평가 작성');
    if(hasDraft('leader'))leaderLabel.appendChild(h('span',{className:'draft-badge'},'임시저장 있음'));
    i2.appendChild(leaderLabel);i2.appendChild(h('div',{className:'desc'},'리드 또는 동료가 대상자를 평가합니다'));b2.appendChild(i2);b2.appendChild(h('span',{className:'arrow'},'→'));inner.appendChild(b2);
    ld.appendChild(inner);app.appendChild(ld);return;
  }

    inner.appendChild(h('button',{onClick:()=>{mode=null;D={};submitted=false;activeNav=0;R()}},'처음으로 돌아가기'));
    dn.appendChild(inner);app.appendChild(dn);return;
  }

  // ═══ FORM: All sections on one page ═══

  if(!allFilled())submitBtn.disabled=true;
  si.appendChild(submitBtn);
  sb.appendChild(si);app.appendChild(sb);

  // Setup scroll spy after DOM render
  requestAnimationFrame(()=>setupScrollSpy());
}
